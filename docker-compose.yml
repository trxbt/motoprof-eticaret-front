version: '3.8'

services:

  # ── Backend (FastAPI + SQLAlchemy) ────────────────────────────
  backend:
    build:
      context: ./backend
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CORS_ORIGINS: ${SITE_URL},http://localhost:3000
      IYZICO_API_KEY: ${IYZICO_API_KEY}
      IYZICO_SECRET_KEY: ${IYZICO_SECRET_KEY}
      IYZICO_BASE_URL: ${IYZICO_BASE_URL}
      FRONTEND_URL: ${SITE_URL}
    networks:
      - motoprof_net
      - coolify

  # ── Frontend (React + Nginx) ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_BACKEND_URL: ${SITE_URL}
    restart: always
    environment:
      SERVICE_FQDN_FRONTEND: ${SERVICE_FQDN_FRONTEND}
    ports:
      - "80:80"
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - motoprof_net
      - coolify
      - coolify-ingress

networks:
  motoprof_net:
    driver: bridge
  coolify:
    external: true
  coolify-ingress:
    name: ${COOLIFY_RESOURCE_UUID}
    external: true
