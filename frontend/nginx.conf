server {
    listen 80 default_server;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;
    
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Gzip sıkıştırma
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        image/svg+xml font/woff2;

    # Statik dosyalar için uzun cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # manifest ve sw için cache engelle
    location ~* (manifest\.json|sw\.js|robots\.txt)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Docker iç ağında (backend) IP değişirse Nginx'in takılmaması için dinamik çözüm:
    resolver 127.0.0.11 valid=10s;

    # API isteklerini backend'e proxy et
    location /api/ {
        set $backend_api http://backend:8001;
        proxy_pass         $backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # Sitemap
    location = /sitemap.xml {
        set $backend_api http://backend:8001;
        rewrite ^ /api/sitemap.xml break;
        proxy_pass $backend_api;
        proxy_set_header Host $host;
    }

    # React SPA — tüm rotalar index.html'e
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # 404 sayfası
    error_page 404 /index.html;
}
